<!DOCTYPE html>

        <style>
            body, html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
                background-color: #ffffff;
            }
            #main {
                width: 720px;
                height: 720px;
                position: absolute;
            }
            .container {
                display: flex;
                justify-content: flex-start;
                align-items: flex-end;
                flex-direction: column;
                width: 720px;
                height: 720px;
            }
            #menu {
                background-color: #ffffff;
                color: #000000;
                border: 1px solid #000000;
                box-shadow: 2px 2px 5px black;
                padding: 10px;
                z-index: 1;
            }
            .hidden {
                display: none;
            }
            .menu-list {
                list-style-type: none;
                padding: 0;
                margin: 0;
            }
            .menu-button {
                background-color: #ffffff;
                color: #000000;
                border: 0px solid #000000;
                padding: 5px;
                margin: 5px;
            }
        </style>
    </head>

                The menu should have a padding of 10px
