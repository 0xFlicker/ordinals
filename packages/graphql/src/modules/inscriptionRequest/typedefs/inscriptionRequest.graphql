type InscriptionData {
  textContent: String
  base64Content: String
  contentType: String!
}

enum FeeLevel {
  GLACIAL
  LOW
  MEDIUM
  HIGH
}

input InscriptionDataInput {
  textContent: String
  base64Content: String
  contentType: String!
}

input InscriptionRequest {
  files: [InscriptionDataInput!]!
  destinationAddress: String!
  network: BitcoinNetwork!
  feeLevel: FeeLevel
  feePerByte: Int
}
