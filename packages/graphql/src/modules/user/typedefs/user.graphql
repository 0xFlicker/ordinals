enum AddressType {
  EVM
  BTC
}

type Address {
  type: AddressType!
  address: String!
}

type Nonce {
  nonce: String!
  messageToSign: String!
  domain: String!
  expiration: String!
  issuedAt: String!
  uri: String!
  version: String
  chainId: Int
  pubKey: String!
  address: Address!
}

type Web3User {
  id: ID!
  addresses: [Address!]!
  roles: [Role!]!
  allowedActions: [Permission!]!
  token: String
  handle: String!
}

type Mutation {
  nonceEthereum(address: ID!, chainId: Int!): Nonce!
  nonceBitcoin(address: ID!): Nonce!
  nonceFrame(trustedBytes: String!): Nonce!
}

type Query {
  user(id: ID!): Web3User!
}
